apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-submitter
  namespace: job-monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: job-submitter
  template:
    metadata:
      labels:
        app: job-submitter
    spec:
      containers:
        - name: job-submitter
          image: job-submitter:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: job-submitter
  namespace: job-monitoring
spec:
  selector:
    app: job-submitter
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
