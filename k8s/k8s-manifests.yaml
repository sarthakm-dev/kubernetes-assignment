apiVersion: v1
kind: Namespace
metadata:
  name: job-monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: job-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: job-monitoring
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-submitter
  namespace: job-monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: job-submitter
  template:
    metadata:
      labels:
        app: job-submitter
    spec:
      containers:
        - name: job-submitter
          image: job-submitter:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: '6379'
            - name: PORT
              value: '3000'
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: job-submitter
  namespace: job-monitoring
spec:
  selector:
    app: job-submitter
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-worker
  namespace: job-monitoring
spec:
  replicas: 2
  selector:
    matchLabels:
      app: job-worker
  template:
    metadata:
      labels:
        app: job-worker
    spec:
      containers:
        - name: job-worker
          image: job-worker:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: '6379'
            - name: PORT
              value: '3000'
          resources:
            requests:
              cpu: '250m'
              memory: '256Mi'
            limits:
              cpu: '1000m'
              memory: '512Mi'
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: job-worker
  namespace: job-monitoring
  labels:
    app: job-worker
spec:
  selector:
    app: job-worker
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-aggregator
  namespace: job-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-aggregator
  template:
    metadata:
      labels:
        app: job-aggregator
    spec:
      containers:
        - name: job-aggregator
          image: job-aggregator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: '6379'
            - name: PORT
              value: '3000'
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: job-aggregator
  namespace: job-monitoring
  labels:
    app: job-aggregator
spec:
  selector:
    app: job-aggregator
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: job-submitter-ingress
  namespace: job-monitoring
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - http:
        paths:
          - path: /submit
            pathType: Prefix
            backend:
              service:
                name: job-submitter
                port:
                  number: 80
          - path: /status
            pathType: Prefix
            backend:
              service:
                name: job-submitter
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: job-worker-hpa
  namespace: job-monitoring
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: job-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: job-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-job-monitoring-discovery
rules:
  - apiGroups: ['']
    resources: ['pods', 'services', 'endpoints', 'nodes']
    verbs: ['get', 'list', 'watch']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-job-monitoring-discovery
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-job-monitoring-discovery
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: job-monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: job-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090
      - job_name: job-worker
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - job-monitoring
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: job-worker
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            regex: 3000
            action: keep
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
        metrics_path: /metrics
      - job_name: job-aggregator
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - job-monitoring
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: job-aggregator
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            regex: 3000
            action: keep
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
        metrics_path: /metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: job-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: job-monitoring
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: job-monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: job-monitoring
data:
  dashboardproviders.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: job-monitoring
data:
  job-worker-monitoring.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "#000000",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": null,
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "title": "Jobs Processed Total",
          "type": "graph",
          "targets": [
            { "expr": "jobs_processed_total", "legendFormat": "jobs_processed", "refId": "A" }
          ]
        },
        {
          "datasource": null,
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "title": "Job Processing Time (Histogram)",
          "type": "graph",
          "targets": [
            {
              "expr": "rate(job_processing_time_seconds_sum[5m]) / rate(job_processing_time_seconds_count[5m])",
              "legendFormat": "avg_time_s",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": null,
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 3,
          "title": "Queue Length",
          "type": "graph",
          "targets": [{ "expr": "queue_length", "legendFormat": "queue", "refId": "A" }]
        },
        {
          "datasource": null,
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 4,
          "title": "Worker CPU Usage (%)",
          "type": "graph",
          "targets": [
            {
              "expr": "sum by (pod) ((rate(process_cpu_user_seconds_total{job=\"job-worker\"}[1m]) + rate(process_cpu_system_seconds_total{job=\"job-worker\"}[1m])) * 100)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "5s",
      "schemaVersion": 30,
      "style": "dark",
      "tags": ["kubernetes", "jobs"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Job Worker Monitoring",
      "uid": "job-worker-monitoring",
      "version": 1
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: job-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.4
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboard
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: grafana-dashboard
          configMap:
            name: grafana-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: job-monitoring
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 80
      targetPort: 3000
  type: ClusterIP
